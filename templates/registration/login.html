<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Hexnode UEM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#1a3c6e; font-family:'Segoe UI',sans-serif;
  }
  .login-box {
    background:#fff; border-radius:16px; padding:40px 36px;
    width:100%; max-width:380px;
  }
  .brand { text-align:center; margin-bottom:28px; }
  .brand-logo {
    width:56px; height:56px; background:#1a3c6e; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; color:#0d99ff; margin:0 auto 10px;
  }
  .brand h4 { color:#1a3c6e; font-weight:700; margin:0; font-size:1.2rem; }
  .brand p  { color:#6b7892; font-size:.8rem; margin:4px 0 0; }
  .form-control { border-radius:8px; font-size:.9rem; padding:10px 12px; border:1.5px solid #d1d9e6; }
  .form-control:focus { border-color:#0d99ff; box-shadow:0 0 0 3px rgba(13,153,255,.15); }
  .form-label { font-weight:500; font-size:.85rem; color:#374151; }
  .btn-login {
    width:100%; background:#1a3c6e; color:#fff; border:none;
    border-radius:8px; padding:11px; font-weight:600; font-size:.9rem;
    transition:background .2s;
  }
  .btn-login:hover { background:#0d99ff; }
  .hint {
    background:#f0f7ff; border:1px solid #bee3f8; border-radius:8px;
    padding:10px 12px; font-size:.78rem; color:#2b6cb0; margin-top:16px;
  }
  .err { color:#c62828; font-size:.82rem; margin-top:6px; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="brand-logo"><i class="bi bi-hexagon-fill"></i></div>
    <h4>Hexnode UEM</h4>
    <p>Unified Endpoint Management</p>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required>
    </div>
    {% if form.errors %}
    <p class="err"><i class="bi bi-exclamation-circle"></i> Invalid username or password.</p>
    {% endif %}
    <button type="submit" class="btn-login mt-2">
      <i class="bi bi-shield-lock me-2"></i>Sign In
    </button>
  </form>

  <div class="hint">
    <i class="bi bi-info-circle me-1"></i>
    Run <code>python manage.py createsuperuser</code> to create your login.
  </div>
</div>
</body>
</html>
